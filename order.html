<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online – Trinetra Bhojanalaya</title>

    <!-- CSS MODULES -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/order.css">
    <link rel="stylesheet" href="css/cart.css">
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FD2B3KNNN9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-FD2B3KNNN9');
</script>
</head>

<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-circle"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <img src="images/logo.jpg" alt="Logo">
        <div class="navbar-title">Order Online</div>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- SIDE MENU -->
    <div id="overlay"></div>
    <div id="sideMenu" class="side-menu">
        <a href="index.html">🏠 Home</a>
        <a href="index.html#menu">🍽️ Menu</a>
        <a href="index.html#gallery">🖼️ Gallery</a>
        <a href="index.html#contact">📍 Contact</a>
    </div>

    <!-- ORDER LIST -->
    <section id="order" class="section">
        <h2>🛒 Select Items</h2>

        <p class="notice-text">
            Takeaway Only — Online delivery will be available soon. Please place your order and collect it from the
            stall.
        </p>

        <div id="itemsContainer">
            <!-- Will be dynamically populated from js/menuData.js -->
        </div>

        <!-- CART BUTTON -->
        <button class="cart-btn" onclick="openCart()">View Cart 🛒</button>

    </section>

    <!-- CART DRAWER -->
    <div id="cartDrawer" class="cart-drawer">

        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="closeCart()">✖</button>
        </div>

        <div id="cartItems"></div>

        <div class="cart-footer">
            <div class="total-row">
                <strong>Total:</strong>
                <strong id="cartTotal">₹0</strong>
            </div>
            <p class="notice-text" style="margin-bottom: 10px;">
                Takeaway Only — Online delivery will be available soon.
            </p>

            <button class="btn proceed-btn" onclick="proceedOrder()">Proceed on WhatsApp</button>
            <button class="btn clear-btn" onclick="clearCart()">Clear Cart</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/menuData.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("itemsContainer");
            if (container && typeof MENU_ITEMS !== 'undefined') {
                container.innerHTML = MENU_ITEMS.map(item => `
                    <div class="order-item">
                        <img src="${item.image}" alt="${item.name}" loading="lazy">
                        <div class="item-info">
                            <strong>${item.name}</strong>
                            <span>₹${item.price}</span>
                        </div>
                        <div class="qty-action" data-item="${item.id}">
                            <button class="btn btn-primary btn-sm btn-add" onclick="increase('${item.id}'); return false;">Add +</button>
                            <div class="qty-box" style="display: none;">
                                <button onclick="decrease('${item.id}'); return false;">−</button>
                                <span class="qty-span" data-item="${item.id}">0</span>
                                <button onclick="increase('${item.id}'); return false;">+</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                // Sync current cart state to DOM
                for (let key in cart) {
                    updateUI(key);
                }
            }
        });
    </script>


</body>


</html>
